name: Code Coverage

on:
  push:
    branches: [ master, dev ]
  # 避免与 CI 在 PR 上重复跑测试；若需要手动生成覆盖率可用 workflow_dispatch
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  GO_VERSION: '1.26.1'

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: go mod download

    # 尝试恢复 CI 工作流生成的代码缓存
    - name: Restore generated code cache
      uses: actions/cache@v5
      with:
        path: |
          api/gen/
          docs/
          ~/.local/bin/
          ~/go/bin/
        key: ${{ runner.os }}-generated-${{ hashFiles('api/proto/**/*.proto', 'api/buf.gen.yaml', 'api/buf.yaml') }}
        restore-keys: |
          ${{ runner.os }}-generated-

    # 只在缓存未命中时重新生成代码
    - name: Install Proto tools
      run: |
        if [ ! -d "api/gen" ] || [ ! -f "$HOME/.local/bin/protoc" ]; then
          make proto-setup
        fi

    - name: Install Swagger tools  
      run: |
        if [ ! -d "docs" ] || [ ! -f "$HOME/go/bin/swag" ]; then
          make swagger-setup
        fi

    - name: Generate proto code
      run: |
        # 强制重新生成proto代码以确保与当前代码库同步
        echo "Generating proto code to ensure consistency..."
        make proto
        
        # 验证生成是否成功
        if [ ! -d "api/gen" ] || [ $(find api/gen -name "*.pb.go" 2>/dev/null | wc -l) -eq 0 ]; then
          echo "❌ Proto code generation failed or produced no output"
          exit 1
        fi
        
        echo "✅ Proto code generation completed successfully"

    - name: Generate swagger docs
      run: |
        if [ ! -d "docs" ]; then
          make swagger
        fi

    - name: Run tests with coverage
      id: coverage
      run: |
        # 获取所有包，排除自动生成的代码
        PACKAGES=$(go list ./... | grep -v -E '/(api/gen|docs/generated)/')
        
        if [ -z "$PACKAGES" ]; then
          echo "No packages to test"
          echo "coverage=0" >> $GITHUB_OUTPUT
          echo "⚠️ No packages found to test (all packages excluded or no Go packages exist)"
          exit 0
        fi
        
        echo "Testing packages:"
        echo "$PACKAGES"
        
        # 运行测试并生成覆盖率报告 (排除自动生成的代码)
        # 使用 -short 跳过长时间运行的负载测试和压力测试
        go test -v -race -short -coverprofile=coverage.out -covermode=atomic $PACKAGES
        
        # 生成 HTML 报告
        go tool cover -html=coverage.out -o coverage.html
        
        # 计算总覆盖率
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}' || echo "0")
        
        # 确保 COVERAGE 不为空，默认设置为 0
        if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "" ]; then
          COVERAGE="0"
        fi
        
        echo "Total coverage: ${COVERAGE}%"
        echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Coverage Badge
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      run: |
        # 生成覆盖率徽章
        COVERAGE=${{ steps.coverage.outputs.coverage }}
        COLOR=""
        
        # 确保 COVERAGE 不为空，默认设置为 0
        if [ -z "$COVERAGE" ] || [ "$COVERAGE" = "" ]; then
          COVERAGE="0"
        fi
        
        # 转换为整数进行比较（去掉小数点）
        COVERAGE_INT=$(echo "$COVERAGE" | cut -d. -f1)
        
        # 确保 COVERAGE_INT 是有效数字，默认设置为 0
        if [ -z "$COVERAGE_INT" ] || [ "$COVERAGE_INT" = "" ]; then
          COVERAGE_INT="0"
        fi
        
        if [ "$COVERAGE_INT" -ge 80 ]; then
          COLOR="brightgreen"
        elif [ "$COVERAGE_INT" -ge 60 ]; then
          COLOR="yellow"
        else
          COLOR="red"
        fi
        
        echo "Coverage: ${COVERAGE}% (${COLOR})"

    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const coverage = parseFloat('${{ steps.coverage.outputs.coverage }}');
          const body = `## 📊 Code Coverage Report
          
          **Coverage**: ${coverage}%
          
          ${coverage >= 80 ? '✅ Great coverage!' : coverage >= 60 ? '⚠️ Coverage could be improved' : '❌ Low coverage - please add more tests'}
          
          ---
          *Coverage report generated by GitHub Actions*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          coverage.out
          coverage.html
        retention-days: 30
